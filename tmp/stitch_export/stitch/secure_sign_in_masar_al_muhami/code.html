<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>مسار المحامي - تسجيل الدخول الآمن</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&amp;family=Manrope:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#b5ede7",
              "primary": "#003527",
              "on-primary": "#ffffff",
              "surface-tint": "#2b6954",
              "on-secondary": "#ffffff",
              "background": "#f9f9f8",
              "primary-container": "#064e3b",
              "on-surface-variant": "#404944",
              "on-error": "#ffffff",
              "primary-fixed-dim": "#95d3ba",
              "surface-dim": "#dadad9",
              "tertiary": "#735c00",
              "secondary": "#316763",
              "on-primary-fixed": "#002117",
              "surface-container": "#eeeeed",
              "secondary-fixed-dim": "#9ad1cb",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f4f4f3",
              "on-secondary-container": "#376d69",
              "surface-container-high": "#e8e8e7",
              "on-secondary-fixed-variant": "#144f4b",
              "on-tertiary-container": "#4e3d00",
              "surface-bright": "#f9f9f8",
              "inverse-primary": "#95d3ba",
              "on-background": "#1a1c1c",
              "on-tertiary-fixed": "#241a00",
              "on-error-container": "#93000a",
              "surface-variant": "#e2e2e2",
              "surface": "#f9f9f8",
              "on-tertiary-fixed-variant": "#574500",
              "outline-variant": "#bfc9c3",
              "primary-fixed": "#b0f0d6",
              "error": "#ba1a1a",
              "on-secondary-fixed": "#00201e",
              "outline": "#707974",
              "surface-container-highest": "#e2e2e2",
              "on-surface": "#1a1c1c",
              "error-container": "#ffdad6",
              "on-primary-fixed-variant": "#0b513d",
              "secondary-container": "#b5ede7",
              "inverse-surface": "#2f3130",
              "tertiary-container": "#cca72f",
              "tertiary-fixed": "#ffe088",
              "tertiary-fixed-dim": "#e9c349",
              "inverse-on-surface": "#f1f1f0",
              "on-primary-container": "#80bea6",
              "on-tertiary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope", "IBM Plex Sans Arabic"],
              "body": ["IBM Plex Sans Arabic"],
              "label": ["IBM Plex Sans Arabic"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.8);
      }
      .asymmetric-shape {
        clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Hero Background Element (Asymmetric Intent) -->
<div class="fixed top-0 right-0 w-full h-[353px] bg-gradient-to-br from-primary-container to-primary asymmetric-shape -z-10 opacity-10"></div>
<main class="w-full max-w-md px-6 py-12 flex flex-col items-center">
<!-- Branding Header -->
<header class="mb-10 text-center">
<div class="mb-6 flex justify-center">
<img alt="مسار المحامي Logo" class="h-24 w-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ug8At_te-QVxQky4mkeYTtLz63RagcS1jd0buSueQqCfYL8YVKxXHWbLN58Vk4WBF-arP6Oj8TJhFZ96JekcbM4kfHBSBrtA4ME1-39_6RLx1-JEprf3ft1LL9QYXq2wbB1AqpYk_T_SoXmuK4p3wvxQbNo-6XHMrDpGdaatEdq0oHsj31bJRb1Iz_yfBmzKUwIaNaUmNG0Z5YmN0knZAFWs9RenB6j8K5ucxBgNn-WVpRc4byuSpxXHYPdn0jtgIOM5vR2L8w4"/>
</div>
<h1 class="text-3xl font-headline font-extrabold text-primary tracking-tight mb-2">أهلاً بك مجدداً</h1>
<p class="text-on-surface-variant font-medium">الوصول الآمن لمنصة مسار المحامي</p>
</header>
<!-- Login Card -->
<section class="w-full bg-surface-container-lowest rounded-xl shadow-2xl shadow-black/5 p-8 border border-outline-variant/10">
<form class="space-y-6">
<!-- Username/Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant px-1" for="identity">اسم المستخدم أو البريد الإلكتروني</label>
<div class="relative group">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pr-12 pl-4 py-4 bg-surface-container-low border-b-2 border-transparent focus:border-primary rounded-lg outline-none transition-all placeholder:text-outline-variant" id="identity" placeholder="lawyer@firm.sa" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">كلمة المرور</label>
<a class="text-xs font-bold text-tertiary hover:underline" href="#">نسيت كلمة المرور؟</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pr-12 pl-12 py-4 bg-surface-container-low border-b-2 border-transparent focus:border-primary rounded-lg outline-none transition-all" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant cursor-pointer hover:text-on-surface transition-colors" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full py-4 bg-gradient-to-b from-primary-container to-primary text-on-primary font-bold rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined" data-icon="login">login</span>
<span>تسجيل الدخول</span>
</button>
<!-- Biometrics Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-surface-container-high"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-outline uppercase tracking-widest">أو عبر</span>
<div class="flex-grow border-t border-surface-container-high"></div>
</div>
<!-- Biometric & SSO Actions -->
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-outline-variant/20 hover:bg-surface-container-low transition-colors group" type="button">
<span class="material-symbols-outlined text-primary text-3xl group-hover:scale-110 transition-transform" data-icon="faceid" style="font-variation-settings: 'FILL' 0;">face</span>
<span class="text-xs font-bold text-on-surface-variant">FaceID</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-outline-variant/20 hover:bg-surface-container-low transition-colors group" type="button">
<span class="material-symbols-outlined text-primary text-3xl group-hover:scale-110 transition-transform" data-icon="fingerprint">fingerprint</span>
<span class="text-xs font-bold text-on-surface-variant">بصمة الإصبع</span>
</button>
</div>
<button class="w-full py-3 px-4 border border-outline-variant/30 text-on-surface-variant text-sm font-semibold rounded-lg hover:bg-surface-container transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-lg" data-icon="corporate_fare">corporate_fare</span>
<span>تسجيل الدخول الموحد (SSO)</span>
</button>
</form>
</section>
<!-- Footer / Trust Section -->
<footer class="mt-12 w-full">
<div class="flex flex-wrap justify-center gap-6 opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
<div class="flex items-center gap-2 text-xs font-bold">
<span class="material-symbols-outlined text-primary text-lg" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span>تشفير 256-بت</span>
</div>
<div class="flex items-center gap-2 text-xs font-bold">
<span class="material-symbols-outlined text-primary text-lg" data-icon="shield" style="font-variation-settings: 'FILL' 1;">shield</span>
<span>اتصال آمن</span>
</div>
<div class="flex items-center gap-2 text-xs font-bold">
<span class="material-symbols-outlined text-primary text-lg" data-icon="cloud_done" style="font-variation-settings: 'FILL' 1;">cloud_done</span>
<span>سحابة محمية</span>
</div>
</div>
<p class="text-center text-[10px] text-outline mt-8 leading-relaxed max-w-[280px] mx-auto">
                جميع الحقوق محفوظة © 2024 لشركة مسار المحامي للأنظمة التقنية والحلول القانونية.
            </p>
</footer>
</main>
<!-- Decorative Calligraphic Elements -->
<div class="fixed bottom-0 left-0 p-12 opacity-[0.03] select-none -z-20">
<span class="material-symbols-outlined text-[20rem]" data-icon="balance">balance</span>
</div>
</body></html>
