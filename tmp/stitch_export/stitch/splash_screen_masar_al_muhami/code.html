<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D4AF37' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid #D4AF37;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: #003527;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="antialiased overflow-hidden">
<!-- Main Splash Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-between py-20 bg-primary overflow-hidden">
<!-- Abstract Background Layers -->
<div class="absolute inset-0 z-0">
<!-- Professional Saudi Geometric Pattern Overlay -->
<div class="absolute inset-0 pattern-overlay opacity-40"></div>
<!-- Tonal Radial Gradient for Depth -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary via-primary-container to-primary opacity-90"></div>
<!-- Dynamic Light Accent -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-tertiary opacity-5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-emerald-400 opacity-5 blur-[120px] rounded-full"></div>
</div>
<!-- Top Branding/Tagline (Optional subtle presence) -->
<div class="relative z-10 opacity-60">
<span class="text-on-primary font-arabic text-sm tracking-[0.2em] font-light">
                النظام الرقمي المتكامل
            </span>
</div>
<!-- Center Identity Section -->
<div class="relative z-10 flex flex-col items-center gap-8">
<!-- Logo Container with Decorative Elements -->
<div class="relative group">
<!-- Outer Arch Motif Glow -->
<div class="absolute -inset-8 bg-tertiary/10 blur-3xl rounded-full scale-110"></div>
<!-- Logo Frame -->
<div class="relative bg-primary-container/40 p-10 rounded-[3rem] backdrop-blur-md shadow-2xl shadow-black/40 border border-on-primary-fixed-variant/20 flex flex-col items-center justify-center bg-transparent border-none shadow-none p-0">
<img alt="Masar Al-Muhami Logo" class="w-64 h-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ug8At_te-QVxQky4mkeYTtLz63RagcS1jd0buSueQqCfYL8YVKxXHWbLN58Vk4WBF-arP6Oj8TJhFZ96JekcbM4kfHBSBrtA4ME1-39_6RLx1-JEprf3ft1LL9QYXq2wbB1AqpYk_T_SoXmuK4p3wvxQbNo-6XHMrDpGdaatEdq0oHsj31bJRb1Iz_yfBmzKUwIaNaUmNG0Z5YmN0knZAFWs9RenB6j8K5ucxBgNn-WVpRc4byuSpxXHYPdn0jtgIOM5vR2L8w4"/>
</div>
<!-- Brand Text Under Logo -->
<div class="mt-8 text-center">
<p class="mt-4 text-primary-fixed-dim font-arabic font-medium text-lg opacity-80">
                        لإدارة العمليات القانونية
                    </p>
</div>
</div>
</div>
<!-- Bottom Status/Loading Section -->
<div class="relative z-10 flex flex-col items-center gap-6 mb-10">
<!-- Gold Circular Progress Indicator -->
<div class="loader-ring"></div>
<div class="text-center">
<p class="text-emerald-100/60 font-arabic text-sm font-light tracking-wide">
                    جاري تهيئة البيئة القانونية الآمنة...
                </p>
</div>
<!-- Trust Indicators -->
<div class="mt-8 flex items-center gap-4 text-emerald-100/30">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xs">shield</span>
<span class="font-arabic text-[10px] uppercase tracking-widest">تشفير متقدم</span>
</div>
<div class="w-1 h-1 bg-emerald-100/20 rounded-full"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xs">verified_user</span>
<span class="font-arabic text-[10px] uppercase tracking-widest">موثوق ومعتمد</span>
</div>
</div>
</div>
<!-- Decorative Subtle Footnote -->
<div class="absolute bottom-6 left-0 w-full text-center z-10 px-6">
<p class="text-emerald-900/40 font-arabic text-[11px] leading-relaxed">
                جميع الحقوق محفوظة © ٢٠٢٤ لمكتب مسار للمحاماة والاستشارات القانونية
            </p>
</div>
</main>
<!-- Navigation suppression as per "The Destination Rule" for splash screens -->
<!-- (No BottomNavBar or TopAppBar rendered for this transactional/onboarding view) -->
